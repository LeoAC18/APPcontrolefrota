workflows:
  ios-desenvolvimento:
    name: MC Vistoria — iOS Teste (sem App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: br.com.mctransportes.vistoria
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 20.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Instalar dependências Node
        script: npm ci

      - name: Sincronizar Capacitor com iOS
        script: npx cap sync ios

      - name: Instalar Pods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Debug

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
